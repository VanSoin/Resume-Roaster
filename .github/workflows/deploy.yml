name: Deploy Resume Roaster to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            cd /home/ec2-user/Resume-Roaster
            git pull origin main

            # recreate env file
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env

            # 🚀 SAFEST CLEANUP: kill anything using port 8501
            docker ps -q --filter "publish=8501" | xargs -r docker stop
            docker ps -q --filter "publish=8501" | xargs -r docker rm

            # remove old container if name exists (extra safety)
            docker rm -f resume-roaster || true

            # build new image
            docker build -t resume-roaster .

            # run fresh container
            docker run -d \
              -p 8501:8501 \
              --name resume-roaster \
              --restart unless-stopped \
              --env-file .env \
              resume-roaster